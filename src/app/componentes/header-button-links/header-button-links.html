<button
  type="button"
  [class]="activo()
    ? 'inline-flex items-center gap-2 rounded-md bg-[#14161d] px-4 py-2 text-[13px] font-semibold text-white transition-colors hover:bg-white/10 cursor-pointer'
    : 'inline-flex items-center gap-2 rounded-md px-4 py-2 text-[13px] font-semibold text-gray-400 transition-colors hover:bg-[#14161d] hover:text-white cursor-pointer'"
>
  <ng-content select="[icon]"></ng-content>
  {{ nombre() }}
  <ng-content select="[badge]"></ng-content>
</button>
